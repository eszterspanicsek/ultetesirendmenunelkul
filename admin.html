<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ültetési rend admin</title>
  <script src="data.js"></script>
  <style>
    :root {
      --bg: #f7f0ea;
      --surface: #fffaf6;
      --primary: #b68663;
      --primary-dark: #94684a;
      --text: #3e3028;
      --border: #e8d7ca;
      --ok: #2f7d4f;
      --warn: #8a5b3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #f4ede7;
    }
    .wrap {
      display: grid;
      grid-template-columns: minmax(360px, 560px) 1fr;
      min-height: 100vh;
    }
    .panel {
      background: #fbf7f3;
      padding: 24px;
      border-right: 1px solid var(--border);
      overflow: auto;
    }
    .preview { min-height: 100vh; background: #efe4db; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p.top { margin: 0 0 18px; line-height: 1.5; color: #6a5649; }
    .section {
      background: #fffaf6;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
    }
    .section h2 { margin: 0 0 14px; font-size: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .full { grid-column: 1 / -1; }
    label { display: block; font-weight: 700; margin-bottom: 6px; color: #7a563f; }
    input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 16px;
      background: white;
    }
    textarea { min-height: 96px; resize: vertical; }
    input[type="color"] {
      width: 100%; height: 46px; border: 1px solid var(--border); border-radius: 14px; background: white; padding: 6px;
    }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0;
    }
    button {
      border: 0; border-radius: 14px; padding: 12px 16px; cursor: pointer; font-size: 15px; font-weight: 700;
      background: var(--primary); color: white;
    }
    button.secondary { background: #ead8ca; color: #5b4335; }
    button.ghost { background: white; color: #6a4b37; border: 1px solid var(--border); }
    .status {
      display: none; margin-bottom: 14px; padding: 12px 14px; border-radius: 14px; font-weight: 700;
    }
    .status.show { display: block; }
    .status.ok { background: #e8f6ed; color: var(--ok); border: 1px solid #bfe2c9; }
    .status.warn { background: #fff3e7; color: var(--warn); border: 1px solid #f1d3b3; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 6px; border-bottom: 1px solid #eee1d6; text-align: left; vertical-align: top; }
    .guest-name, .guest-table { width: 100%; }
    .guest-actions button { padding: 9px 11px; font-size: 13px; }
    iframe { width: 100%; min-height: 100vh; border: 0; display: block; background: white; }
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
      .preview { min-height: 620px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Esküvői ültetési rend – admin</h1>
      <p class="top">Itt tudod átírni a szövegeket, színeket és a vendéglistát. A Mentés után a jobb oldali előnézet azonnal frissül ugyanebben az ablakban.</p>
      <div id="status" class="status"></div>

      <div class="section">
        <h2>Szövegek</h2>
        <div class="grid">
          <div><label>Pár neve</label><input type="text" id="coupleName"></div>
          <div><label>Dátum</label><input type="text" id="date"></div>
          <div><label>Helyszín</label><input type="text" id="venue"></div>
          <div><label>Kis felső címke</label><input type="text" id="eyebrow"></div>
          <div class="full"><label>Főcím</label><input type="text" id="title"></div>
          <div class="full"><label>Leírás</label><textarea id="description"></textarea></div>
          <div><label>Kereső mező helyőrző</label><input type="text" id="searchPlaceholder"></div>
          <div><label>Kereső gomb szövege</label><input type="text" id="searchButton"></div>
          <div><label>Eredmény címke</label><input type="text" id="resultLabel"></div>
          <div><label>Nincs találat cím</label><input type="text" id="notFoundTitle"></div>
          <div class="full"><label>Nincs találat szöveg</label><textarea id="notFoundText"></textarea></div>
          <div class="full"><label>Lábléc</label><input type="text" id="footer"></div>
        </div>
      </div>

      <div class="section">
        <h2>Színek</h2>
        <div class="grid">
          <div><label>Háttér</label><input type="color" id="bg"></div>
          <div><label>Kártya háttér</label><input type="color" id="surface"></div>
          <div><label>Fő kiemelő</label><input type="color" id="primary"></div>
          <div><label>Sötétebb kiemelő</label><input type="color" id="primaryDark"></div>
          <div><label>Szöveg</label><input type="color" id="text"></div>
          <div><label>Szegély</label><input type="color" id="border"></div>
        </div>
      </div>

      <div class="section">
        <h2>Vendéglista</h2>
        <div class="toolbar">
          <button type="button" class="secondary" id="addGuestBtn">+ Új vendég</button>
          <button type="button" class="ghost" id="loadSampleBtn">Mintaadatok visszaállítása</button>
        </div>
        <table>
          <thead><tr><th>Név</th><th>Asztal</th><th></th></tr></thead>
          <tbody id="guestRows"></tbody>
        </table>
      </div>

      <div class="toolbar">
        <button type="button" id="saveBtn">Mentés</button>
        <button type="button" class="secondary" id="downloadDataBtn">data.js letöltése</button>
        <button type="button" class="ghost" id="downloadGuestBtn">Kész vendégoldal letöltése</button>
      </div>
    </div>

    <div class="preview">
      <iframe id="previewFrame" title="Vendégoldal előnézet"></iframe>
    </div>
  </div>

  <script>
    const DEFAULT_DATA = JSON.parse(JSON.stringify(window.WEDDING_APP_DATA));

    function getStoredData() {
      const local = localStorage.getItem('weddingSeatingDataV4');
      if (local) {
        try { return JSON.parse(local); } catch (e) {}
      }
      return JSON.parse(JSON.stringify(window.WEDDING_APP_DATA));
    }

    let state = getStoredData();

    const contentFields = ['coupleName','date','venue','eyebrow','title','description','searchPlaceholder','searchButton','footer','resultLabel','notFoundTitle','notFoundText'];
    const themeFields = ['bg','surface','primary','primaryDark','text','border'];

    function showStatus(message, type='ok') {
      const el = document.getElementById('status');
      el.className = 'status show ' + type;
      el.textContent = message;
      clearTimeout(showStatus._timer);
      showStatus._timer = setTimeout(() => el.className = 'status', 3000);
    }

    function fillForm() {
      contentFields.forEach(id => document.getElementById(id).value = state.content[id] || '');
      themeFields.forEach(id => document.getElementById(id).value = state.theme[id] || '#ffffff');
      renderGuestRows();
      renderPreview();
    }

    function renderGuestRows() {
      const tbody = document.getElementById('guestRows');
      tbody.innerHTML = '';
      state.guests.forEach((guest, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input class="guest-name" type="text" value="${escapeHtml(guest.name || '')}" data-index="${index}" data-key="name"></td>
          <td><input class="guest-table" type="text" value="${escapeHtml(guest.table || '')}" data-index="${index}" data-key="table"></td>
          <td class="guest-actions"><button type="button" class="ghost" data-remove="${index}">Törlés</button></td>
        `;
        tbody.appendChild(tr);
      });
      tbody.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', (e) => {
          const i = Number(e.target.dataset.index);
          const key = e.target.dataset.key;
          state.guests[i][key] = e.target.value;
        });
      });
      tbody.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.guests.splice(Number(btn.dataset.remove), 1);
          renderGuestRows();
        });
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function collectForm() {
      contentFields.forEach(id => state.content[id] = document.getElementById(id).value);
      themeFields.forEach(id => state.theme[id] = document.getElementById(id).value);
      state.guests = state.guests.filter(g => (g.name || '').trim() || (g.table || '').trim());
      return state;
    }

    function renderPreview() {
      collectForm();
      const doc = buildGuestHtml(state, false);
      document.getElementById('previewFrame').srcdoc = doc;
    }

    function buildGuestHtml(data, standalone) {
      const json = JSON.stringify(data).replace(/</g, '\\u003c');
      const dataScript = standalone
        ? `<script>window.WEDDING_APP_DATA = ${json};<\/script>`
        : `<script>window.WEDDING_APP_DATA = ${json};<\/script>`;
      return `<!DOCTYPE html>${documentGuestTemplate(dataScript)}`;
    }

    function documentGuestTemplate(dataScript) {
      return `
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Esküvői ültetési rend</title>
${dataScript}
<style>
:root { --bg:#f7f0ea; --surface:#fffaf6; --primary:#b68663; --primary-dark:#94684a; --text:#3e3028; --border:#e8d7ca; }
*{box-sizing:border-box} body{margin:0;font-family:Georgia,'Times New Roman',serif;background:linear-gradient(180deg,var(--bg),#fbf7f3);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:100%;max-width:620px;background:rgba(255,250,246,.96);border:1px solid var(--border);border-radius:28px;padding:28px;box-shadow:0 20px 60px rgba(90,60,40,.12)}.eyebrow{letter-spacing:.18em;text-transform:uppercase;color:var(--primary-dark);font-size:12px;margin-bottom:12px}h1{margin:0 0 8px;font-size:38px;line-height:1.1}.meta{margin:0 0 18px;opacity:.85;font-size:17px;line-height:1.35}.desc{margin:0 0 24px;font-size:18px;line-height:1.6}.search{display:grid;grid-template-columns:1fr;gap:12px}input{width:100%;border:1px solid var(--border);border-radius:16px;padding:16px 18px;font-size:18px;background:#fff;color:var(--text);outline:none}input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(182,134,99,.15)}button{border:0;border-radius:16px;padding:16px 18px;font-size:18px;cursor:pointer;background:var(--primary);color:#fff;font-weight:700}button:hover{background:var(--primary-dark)}.result{margin-top:22px;border:1px solid var(--border);border-radius:22px;padding:20px;background:#fff;display:none}.result.show{display:block}.result-label{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary-dark);margin-bottom:8px}.result-table{font-size:48px;font-weight:700;line-height:1}.result-name{margin-top:10px;font-size:18px}.notfound-title{font-size:24px;font-weight:700;margin-bottom:8px}.footer{margin-top:22px;font-size:15px;opacity:.8}@media (max-width:640px){body{padding:16px}.card{padding:20px;border-radius:24px}h1{font-size:26px;line-height:1.08;white-space:nowrap}.meta{font-size:13px;line-height:1.25;white-space:nowrap}.desc{font-size:16px;line-height:1.5}input,button{font-size:16px;padding:15px 16px}.result-table{font-size:40px}.result-name{font-size:16px}.footer{font-size:14px}}
</style>
</head>
<body>
<main class="card"><div class="eyebrow" id="eyebrow"></div><h1 id="title"></h1><p class="meta"><span id="couple"></span> · <span id="date"></span> · <span id="venue"></span></p><p class="desc" id="description"></p><div class="search"><input id="nameInput" type="text" autocomplete="name" /><button id="searchBtn" type="button"></button></div><section class="result" id="result"></section><div class="footer" id="footer"></div></main>
<script>
function getData(){const local=localStorage.getItem('weddingSeatingDataV4');if(local){try{return JSON.parse(local)}catch(e){}}return window.WEDDING_APP_DATA}
function normalize(text){return(text||'').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ')}
function renderChrome(data){const c=data.content,t=data.theme;document.documentElement.style.setProperty('--bg',t.bg);document.documentElement.style.setProperty('--surface',t.surface);document.documentElement.style.setProperty('--primary',t.primary);document.documentElement.style.setProperty('--primary-dark',t.primaryDark);document.documentElement.style.setProperty('--text',t.text);document.documentElement.style.setProperty('--border',t.border);eyebrow.textContent=c.eyebrow||'';title.textContent=c.title||'';couple.textContent=c.coupleName||'';date.textContent=c.date||'';venue.textContent=c.venue||'';description.textContent=c.description||'';nameInput.placeholder=c.searchPlaceholder||'Név';searchBtn.textContent=c.searchButton||'Keresés';footer.textContent=c.footer||''}
function findGuest(guests,name){const n=normalize(name);return guests.find(g=>normalize(g.name)===n)}
function showResult(data,guest){const el=document.getElementById('result');const c=data.content;if(guest){el.innerHTML='<div class="result-label">'+(c.resultLabel||'Asztal')+'</div><div class="result-table">'+guest.table+'</div><div class="result-name">'+guest.name+'</div>'}else{el.innerHTML='<div class="notfound-title">'+(c.notFoundTitle||'Nincs találat')+'</div><div>'+(c.notFoundText||'')+'</div>'}el.classList.add('show')}
const data=getData();renderChrome(data);document.getElementById('searchBtn').addEventListener('click',()=>{const guest=findGuest(data.guests||[],document.getElementById('nameInput').value);showResult(data,guest)});document.getElementById('nameInput').addEventListener('keydown',(e)=>{if(e.key==='Enter')document.getElementById('searchBtn').click()});
<\/script>
</body></html>`;
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      collectForm();
      localStorage.setItem('weddingSeatingDataV4', JSON.stringify(state));
      renderPreview();
      showStatus('Sikeresen mentve. Az előnézet frissült.', 'ok');
    });

    document.getElementById('downloadDataBtn').addEventListener('click', () => {
      collectForm();
      const content = 'window.WEDDING_APP_DATA = ' + JSON.stringify(state, null, 2) + ';\n';
      downloadFile('data.js', content, 'application/javascript');
      showStatus('A data.js letöltése elindult.', 'ok');
    });

    document.getElementById('downloadGuestBtn').addEventListener('click', () => {
      collectForm();
      const html = buildGuestHtml(state, true);
      downloadFile('vendegoldal.html', html, 'text/html;charset=utf-8');
      showStatus('A kész vendégoldal letöltése elindult.', 'ok');
    });

    document.getElementById('addGuestBtn').addEventListener('click', () => {
      state.guests.push({ name: '', table: '' });
      renderGuestRows();
    });

    document.getElementById('loadSampleBtn').addEventListener('click', () => {
      state = JSON.parse(JSON.stringify(DEFAULT_DATA));
      fillForm();
      showStatus('Mintaadatok visszaállítva. Nyomj Mentést, ha ezt akarod eltárolni.', 'warn');
    });

    [...contentFields, ...themeFields].forEach(id => {
      document.getElementById(id).addEventListener('input', () => renderPreview());
    });

    fillForm();
  </script>
</body>
</html>
